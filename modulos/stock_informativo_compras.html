<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock informativo · Compras</title>
<style>
:root{
  --bg:#071524;--panel:#0d2034;--panel2:#102a44;--line:rgba(148,163,184,.22);--txt:#eaf2ff;--mut:#9fb1c8;
  --blue:#38bdf8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--chip:#162f4b;
}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 20% 0,#153555 0,#071524 42%,#06111e 100%);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:10;background:rgba(7,21,36,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:14px 18px}
.top{display:flex;gap:14px;align-items:center;justify-content:space-between;max-width:1500px;margin:0 auto}.brand{display:flex;gap:12px;align-items:center}.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#38bdf8,#1d4ed8);display:grid;place-items:center;font-weight:900;color:white;box-shadow:0 12px 30px rgba(56,189,248,.18)}
h1{font-size:22px;line-height:1.05;margin:0}.sub{color:var(--mut);font-size:13px;margin-top:4px}.status{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid var(--line);background:rgba(15,35,57,.75);border-radius:999px;padding:8px 11px;font-size:12px;color:var(--mut)}.pill.ok{border-color:rgba(34,197,94,.45);color:#b6f5ca;background:rgba(34,197,94,.11)}.pill.warn{border-color:rgba(245,158,11,.45);color:#fde68a;background:rgba(245,158,11,.11)}
main{max-width:1500px;margin:0 auto;padding:18px}.login{max-width:460px;margin:52px auto;background:rgba(13,32,52,.92);border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 20px 80px rgba(0,0,0,.25)}label{display:block;color:var(--mut);font-size:12px;margin:12px 0 6px}input,select{width:100%;border:1px solid var(--line);background:#071827;color:var(--txt);border-radius:12px;padding:12px 13px;font-size:15px;outline:none}input:focus,select:focus{border-color:rgba(56,189,248,.75);box-shadow:0 0 0 3px rgba(56,189,248,.12)}button{border:0;border-radius:13px;padding:12px 14px;background:linear-gradient(135deg,#0ea5e9,#2563eb);color:white;font-weight:800;cursor:pointer}button.secondary{background:#122942;border:1px solid var(--line);color:var(--txt)}button:disabled{opacity:.55;cursor:not-allowed}.login button{width:100%;margin-top:16px}.err{color:#fecaca;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:12px;padding:10px 12px;margin-top:12px;display:none}.toolbar{display:grid;grid-template-columns:1.2fr .8fr .8fr auto;gap:10px;margin-bottom:14px}.companies{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 16px}.tab{border:1px solid var(--line);background:rgba(16,42,68,.75);color:var(--txt);border-radius:999px;padding:10px 13px;font-weight:750;cursor:pointer}.tab.active{background:linear-gradient(135deg,#0ea5e9,#2563eb);border-color:transparent}.section{margin:18px 0 24px}.section-title{display:flex;align-items:center;justify-content:space-between;margin:0 0 10px}.section-title h2{margin:0;font-size:18px}.count{color:var(--mut);font-size:13px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}.card{background:linear-gradient(180deg,rgba(16,42,68,.92),rgba(13,32,52,.92));border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 16px 40px rgba(0,0,0,.18)}
.acc{border:1px solid var(--line);border-radius:18px;background:rgba(9,24,40,.78);margin:14px 0;overflow:hidden}.acc>summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;font-weight:850}.acc>summary::-webkit-details-marker{display:none}.acc>summary:hover{background:rgba(56,189,248,.06)}.acc-body{padding:0 16px 16px}.acc-title{display:flex;align-items:center;gap:10px}.acc-chev{color:var(--blue);font-size:14px;transition:transform .18s ease}.acc[open]>.acc-summary .acc-chev{transform:rotate(90deg)}.acc-sub{color:var(--mut);font-size:12px;font-weight:700}.acc.family-acc{border-radius:16px;margin:10px 0;background:rgba(13,32,52,.88)}.acc.family-acc>summary{padding:12px 14px}.family-name{font-size:15px;font-weight:850}.family-wrap{padding-top:4px}.card.low{border-color:rgba(245,158,11,.45)}.card.zero{opacity:.68;border-color:rgba(239,68,68,.35)}.mat{font-size:16px;font-weight:850;line-height:1.18;margin-bottom:10px}.family{color:var(--mut);font-size:12px;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.qty-row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}.qty-label{color:var(--mut);font-size:12px}.qty{font-size:36px;line-height:.9;font-weight:950;color:#b6f5ca}.unit{font-size:13px;color:var(--mut);font-weight:700;margin-left:5px}.min{font-size:12px;color:var(--mut);text-align:right}.empty{border:1px dashed var(--line);background:rgba(13,32,52,.55);border-radius:18px;padding:28px;text-align:center;color:var(--mut)}.hidden{display:none!important}.loading{padding:45px;text-align:center;color:var(--mut)}.onlyread{color:#b6f5ca;font-weight:850}.foot{margin-top:20px;color:var(--mut);font-size:12px;text-align:center}.updatedFlash{animation:flash .9s ease}@keyframes flash{0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}100%{box-shadow:0 0 0 12px rgba(34,197,94,0)}}
@media(max-width:760px){.top{align-items:flex-start;flex-direction:column}.toolbar{grid-template-columns:1fr}.status{justify-content:flex-start}.grid{grid-template-columns:1fr}h1{font-size:20px}}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="brand"><div class="logo">S</div><div><h1>Stock informativo · Compras</h1><div class="sub">Hierro y pintura · <span class="onlyread">solo lectura</span> · stock libre por empresa</div></div></div>
    <div class="status"><span id="conn" class="pill warn">Sin conectar</span><span id="last" class="pill">Última actualización: —</span><button id="logout" class="secondary hidden">Salir</button></div>
  </div>
</header>
<main>
  <section id="loginBox" class="login">
    <h2 style="margin:0 0 6px">Acceso de consulta</h2>
    <div class="sub">Acceso solo visual. No hay botones para modificar stock.</div>
    <label>Email</label><input id="email" autocomplete="username" value="taller.mantenimiento@sklum.com">
    <label>Contraseña</label><input id="password" type="password" autocomplete="current-password">
    <button id="loginBtn">Entrar</button>
    <div id="loginErr" class="err"></div>
  </section>

  <section id="app" class="hidden">
    <div class="toolbar">
      <input id="search" placeholder="Buscar material, medida, color...">
      <select id="typeFilter"><option value="all">Hierro y pintura</option><option value="hierro">Solo hierro</option><option value="pintura">Solo pintura</option></select>
      <select id="stockFilter"><option value="positive">Solo con stock libre</option><option value="all">Mostrar también 0</option><option value="low">Bajo mínimo / 0</option></select>
      <button id="refresh" class="secondary">Actualizar</button>
    </div>
    <div id="companies" class="companies"></div>
    <div id="content" class="loading">Cargando stock...</div>
    <div class="foot">Esta pantalla solo lee Firestore. No crea, no borra y no modifica material.</div>
  </section>
</main>
<script type="module">
const firebaseConfig={apiKey:"AIzaSyDXKRAam6e8dlHFajtzMNueIo2hUMW-Gkg",authDomain:"gestion-taller-v2.firebaseapp.com",projectId:"gestion-taller-v2",storageBucket:"gestion-taller-v2.firebasestorage.app",messagingSenderId:"888590823508",appId:"1:888590823508:web:6dfd420a3e7ac17d647dc1"};
const {initializeApp,getApps,getApp}=await import('https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js');
const {getAuth,onAuthStateChanged,signInWithEmailAndPassword,signOut}=await import('https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js');
const {getFirestore,doc,getDoc,onSnapshot}=await import('https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js');
const app=getApps().length?getApp():initializeApp(firebaseConfig); const auth=getAuth(app); const dbfs=getFirestore(app);
const STOCK_META=['taller_data','stock']; const QTY_DOC=['taller_data','stock_qty_master']; const KEY='ldh_v2_company_stock_v1';
let stockDB={companies:[],materials:[],stock:[],movements:[],reservations:[],assignments:[],reservationDebts:[]};
let qtyMaster={items:{}}; let activeCompany=''; let unsubStock=null, unsubQty=null; let lastRevision='';
const ACC_KEY='ldh_stock_info_compras_acc_v2_collapsed';
const $=id=>document.getElementById(id); const n=v=>{const x=Number(v);return Number.isFinite(x)?x:0}; const s=v=>String(v??'').trim(); const lower=v=>s(v).toLowerCase();
function esc(v){return s(v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function parse(raw,fb){try{return JSON.parse(raw||'')}catch(e){return fb}}
function dateShort(){return new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function loadAcc(){try{return JSON.parse(localStorage.getItem(ACC_KEY)||'{}')||{}}catch(e){return {}}}
function saveAcc(v){try{localStorage.setItem(ACC_KEY,JSON.stringify(v||{}))}catch(e){}}
function accIsOpen(key,def=true){const all=loadAcc(); return Object.prototype.hasOwnProperty.call(all,key)?!!all[key]:def}
function setAccOpen(key,val){const all=loadAcc(); all[key]=!!val; saveAcc(all)}
function setStatus(txt,ok){$('conn').textContent=txt;$('conn').className='pill '+(ok?'ok':'warn')}
function materialById(id){return (stockDB.materials||[]).find(m=>s(m.id)===s(id))||null}
function companyById(id){return (stockDB.companies||[]).find(c=>s(c.id)===s(id))||null}
const qtyFields=['physicalQty','qtyPhysical','fisico','realQty','stockFisico','stockReal','stockActual','existencias','actualQty','qty','cantidad'];
function rowQty(row){for(const k of qtyFields){if(row&&row[k]!==''&&row[k]!=null&&Number.isFinite(Number(row[k])))return n(row[k])}return null}
function moveQty(companyId,materialId){return (stockDB.movements||[]).filter(m=>s(m.companyId)===s(companyId)&&s(m.materialId)===s(materialId)).reduce((a,m)=>{const t=lower(m.type||m.tipo||'entrada');const q=n(m.qty??m.cantidad);if(['entrada','ajuste_pos','devolucion','in'].includes(t))return a+q;if(['salida','ajuste_neg','consumo','out'].includes(t))return a-q;return a+q},0)}
function qtyMasterItem(companyId,materialId){return (qtyMaster.items||{})[s(companyId)+'|'+s(materialId)]||null}
function physical(companyId,materialId,row){const qm=qtyMasterItem(companyId,materialId);const direct=rowQty(row);if(qm&&Number.isFinite(Number(qm.qty))){const qt=Date.parse(s(qm.updatedAt));const rt=Date.parse(s(row&&row.physicalUpdatedAt));if(!Number.isFinite(rt)||!Number.isFinite(qt)||qt>=rt)return n(qm.qty)}if(direct!==null)return direct;return moveQty(companyId,materialId)}
function closed(x){return ['devuelta','devuelto','cerrada','cerrado','cancelada','cancelado','liberada','liberado','anulada','anulado','resuelta','resuelto','entregado','finalizado','archivado'].includes(lower(x&& (x.status||x.estado)))}
function pendingQty(x){const p=x&&(x.pendingQty??x.qtyPending??x.pendiente);if(p!==undefined&&p!==null&&p!=='')return n(p);const q=n(x&&(x.qty??x.cantidad));const r=n(x&&(x.returnedQty??x.qtyReturned??x.devuelto));return Math.max(0,q-r)}
function reserved(companyId,materialId){return (stockDB.reservations||[]).filter(r=>s(r.companyId)===s(companyId)&&s(r.materialId)===s(materialId)&&!closed(r)).reduce((a,r)=>a+n(r.qty??r.cantidad),0)}
function assigned(companyId,materialId){return (stockDB.assignments||[]).filter(a=>s(a.companyId)===s(companyId)&&s(a.materialId)===s(materialId)&&!closed(a)&&!lower(a.assignmentType||a.reason).includes('otra_empresa')).reduce((sum,a)=>sum+n(a.qty??a.cantidad),0)}
function lent(companyId,materialId){let total=0;(stockDB.assignments||[]).forEach(a=>{if(s(a.companyId)===s(companyId)&&s(a.materialId)===s(materialId)&&!closed(a)&& (lower(a.assignmentType||a.reason).includes('otra_empresa')||s(a.toCompanyId))) total+=pendingQty(a)});(stockDB.reservationDebts||[]).forEach(d=>{if(s(d.companyId)===s(companyId)&&s(d.materialId)===s(materialId)&&!closed(d)) total+=pendingQty(d)});return total}
function freeQty(companyId,materialId,row){return Math.max(0,physical(companyId,materialId,row)-reserved(companyId,materialId)-assigned(companyId,materialId)-lent(companyId,materialId))}
function classify(mat,row){const txt=lower([mat?.type,mat?.tipo,mat?.cat,mat?.category,mat?.categoria,mat?.family,mat?.familia,mat?.grp,row?.family,row?.grp,mat?.name].join(' ')); if(txt.includes('pintura')||txt.includes('disolvente')||txt.includes('ral')||txt.includes('cabina de pintura')) return 'pintura'; if(txt.includes('hierro')||txt.includes('perfil')||txt.includes('chapa')||txt.includes('pletina')||txt.includes('tubo')||txt.includes('varilla')||txt.includes('angulo')||txt.includes('upn')||txt.includes('ipn')||txt.includes('galvaniz')||txt.includes('negro')) return 'hierro'; return 'otro'}
function family(mat,row){return s(mat?.family||mat?.familia||mat?.grp||row?.family||row?.grp||mat?.cat||mat?.category||'Sin familia')}
function unit(mat,row){return s(row?.unit||row?.unidad||mat?.unit||mat?.unidad||'und')}
async function readRemoteStock(){const snap=await getDoc(doc(dbfs,...STOCK_META)); if(!snap.exists()) return null; const meta=snap.data()||{}; const total=n(meta.totalChunks); if(!total) return null; let json=''; for(let i=0;i<total;i++){const cs=await getDoc(doc(dbfs,...STOCK_META,'chunks',String(i))); if(cs.exists()) json+=cs.data().part||''} const all=JSON.parse(json||'{}'); const raw=all[KEY]; return raw?JSON.parse(raw):null}
async function loadRemote(){try{const d=await readRemoteStock(); if(d){stockDB=normalizeDB(d); render(); $('last').textContent='Última actualización: '+dateShort();}}catch(e){console.warn(e); $('content').innerHTML='<div class="empty">No se pudo leer el stock. Revisa conexión o permisos.</div>'}}
function normalizeDB(d){d=d&&typeof d==='object'?d:{}; return {companies:Array.isArray(d.companies)?d.companies:[],materials:Array.isArray(d.materials)?d.materials:[],stock:Array.isArray(d.stock)?d.stock:[],movements:Array.isArray(d.movements)?d.movements:[],reservations:Array.isArray(d.reservations)?d.reservations:[],assignments:Array.isArray(d.assignments)?d.assignments:[],reservationDebts:Array.isArray(d.reservationDebts)?d.reservationDebts:[],updatedAt:d.updatedAt}}
function currentRows(){const q=lower($('search').value);const tf=$('typeFilter').value;const sf=$('stockFilter').value;let idx=0;const rows=(stockDB.stock||[]).map(row=>{const mat=materialById(row.materialId)||{};const ctype=classify(mat,row);const libre=freeQty(row.companyId,row.materialId,row);const out={row,mat,ctype,libre,phys:physical(row.companyId,row.materialId,row),fam:family(mat,row),unit:unit(mat,row),min:n(row.min??mat.min??mat.minimo),name:s(mat.name||row.name||row.materialName||'Material sin nombre'),sortIndex:idx++}; return out}).filter(x=>s(x.row.companyId)===s(activeCompany)).filter(x=>x.ctype==='hierro'||x.ctype==='pintura').filter(x=>tf==='all'||x.ctype===tf).filter(x=>!q||lower(x.name+' '+x.fam+' '+x.unit).includes(q));
return rows.filter(x=>sf==='all'||(sf==='positive'?x.libre>0:(x.libre<=0||x.libre<=x.min))).sort((a,b)=>a.sortIndex-b.sortIndex)}
function groupByFamily(arr){const map=new Map(); arr.forEach(x=>{const k=s(x.fam)||'Sin familia'; if(!map.has(k)) map.set(k,[]); map.get(k).push(x)}); return Array.from(map.entries()).map(([name,items])=>({name,items}));}
function accKeyType(companyId,type){return `type|${companyId}|${type}`} 
function accKeyFamily(companyId,type,fam){return `family|${companyId}|${type}|${lower(fam).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_')}`}
function renderCompanies(){const box=$('companies');const comps=stockDB.companies||[]; if(!activeCompany||!comps.some(c=>s(c.id)===s(activeCompany))) activeCompany=s(comps[0]?.id||''); box.innerHTML=comps.map(c=>`<button class="tab ${s(c.id)===s(activeCompany)?'active':''}" data-company="${esc(c.id)}">${esc(c.name||c.nombre||c.code||'Empresa')}</button>`).join('')||'<div class="empty">No hay empresas en Stock.</div>'; box.querySelectorAll('[data-company]').forEach(b=>b.onclick=()=>{activeCompany=b.dataset.company;render()})}
function render(){renderCompanies(); if(!activeCompany){$('content').innerHTML='<div class="empty">No hay empresa seleccionada.</div>';return} const rows=currentRows(); const groups={hierro:rows.filter(x=>x.ctype==='hierro'),pintura:rows.filter(x=>x.ctype==='pintura')}; const company=companyById(activeCompany); let html=`<div class="section-title"><h2>${esc(company?.name||company?.nombre||'Empresa')}</h2><span class="count">${rows.length} materiales visibles</span></div>`; html+=sectionAccordionHTML('Hierro','hierro',groups.hierro); html+=sectionAccordionHTML('Pintura','pintura',groups.pintura); $('content').innerHTML=html; bindAccordions(); $('content').classList.remove('updatedFlash'); void $('content').offsetWidth; $('content').classList.add('updatedFlash')}
function sectionAccordionHTML(title,type,arr){const typeKey=accKeyType(activeCompany,type); const open=accIsOpen(typeKey,false)?'open':''; if(!arr.length)return `<details class="acc section-acc" ${open} data-acc-key="${esc(typeKey)}"><summary class="acc-summary"><div class="acc-title"><span class="acc-chev">▸</span><div><div>${title}</div><div class="acc-sub">0 materiales</div></div></div><span class="count">0</span></summary><div class="acc-body"><div class="empty">Sin ${title.toLowerCase()} para esta empresa con los filtros actuales.</div></div></details>`; const fams=groupByFamily(arr); return `<details class="acc section-acc" ${open} data-acc-key="${esc(typeKey)}"><summary class="acc-summary"><div class="acc-title"><span class="acc-chev">▸</span><div><div>${title}</div><div class="acc-sub">Desplegable por familias</div></div></div><span class="count">${arr.length} materiales · ${fams.length} familias</span></summary><div class="acc-body">${fams.map(f=>familyAccordionHTML(type,f)).join('')}</div></details>`}
function familyAccordionHTML(type,f){const famKey=accKeyFamily(activeCompany,type,f.name); const open=accIsOpen(famKey,false)?'open':''; return `<details class="acc family-acc" ${open} data-acc-key="${esc(famKey)}"><summary class="acc-summary"><div class="acc-title"><span class="acc-chev">▸</span><div><div class="family-name">${esc(f.name)}</div><div class="acc-sub">Familia</div></div></div><span class="count">${f.items.length} materiales</span></summary><div class="acc-body family-wrap"><div class="grid">${f.items.map(cardHTML).join('')}</div></div></details>`}
function bindAccordions(){document.querySelectorAll('[data-acc-key]').forEach(el=>{el.addEventListener('toggle',()=>setAccOpen(el.dataset.accKey,!!el.open))})}
function cardHTML(x){const low=x.min>0&&x.libre<=x.min;const zero=x.libre<=0;return `<article class="card ${zero?'zero':low?'low':''}"><div class="mat">${esc(x.name)}</div><div class="family">${esc(x.fam)}</div><div class="qty-row"><div><div class="qty-label">Libre</div><div><span class="qty">${fmt(x.libre)}</span><span class="unit">${esc(x.unit)}</span></div></div><div class="min">${x.min>0?'mín. '+fmt(x.min):''}</div></div></article>`}
function fmt(v){return Number.isInteger(Number(v))?String(Number(v)):Number(v).toLocaleString('es-ES',{maximumFractionDigits:2})}
function startListeners(){if(unsubStock)unsubStock(); if(unsubQty)unsubQty(); unsubStock=onSnapshot(doc(dbfs,...STOCK_META),async snap=>{if(!snap.exists())return; const rev=snap.data()?.revision||snap.data()?.updatedAtLocal||''; if(rev&&rev===lastRevision)return; lastRevision=rev; await loadRemote();},e=>console.warn(e)); unsubQty=onSnapshot(doc(dbfs,...QTY_DOC),snap=>{if(snap.exists()){qtyMaster=snap.data()||{items:{}}; render(); $('last').textContent='Última actualización: '+dateShort();}},e=>console.warn(e))}
$('loginBtn').onclick=async()=>{try{$('loginErr').style.display='none';$('loginBtn').disabled=true;await signInWithEmailAndPassword(auth,$('email').value.trim(),$('password').value); }catch(e){$('loginErr').textContent='No se ha podido iniciar sesión.';$('loginErr').style.display='block'}finally{$('loginBtn').disabled=false}}
$('logout').onclick=()=>signOut(auth); ['search','typeFilter','stockFilter'].forEach(id=>$(id).addEventListener('input',render)); $('refresh').onclick=()=>loadRemote();
onAuthStateChanged(auth,user=>{if(user){$('loginBox').classList.add('hidden');$('app').classList.remove('hidden');$('logout').classList.remove('hidden');setStatus('Conectado · solo lectura',true);startListeners();loadRemote();}else{$('loginBox').classList.remove('hidden');$('app').classList.add('hidden');$('logout').classList.add('hidden');setStatus('Sin conectar',false); if(unsubStock)unsubStock(); if(unsubQty)unsubQty();}});
</script>
</body>
</html>
