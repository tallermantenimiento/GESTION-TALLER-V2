<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gestión de Herramientas y Maquinaria</title>
<style>
  :root{--bg:#0b1220;--card:#111b2e;--card2:#0f172a;--txt:#e5e7eb;--mut:#94a3b8;--pri:#22c55e;--warn:#f59e0b;--dang:#ef4444;--line:#26324a;}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:radial-gradient(1200px 800px at 20% 0%,#142040 0%,var(--bg) 55%);color:var(--txt)}
  header{position:sticky;top:0;z-index:20;background:rgba(11,18,32,.82);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .wrap{max-width:1180px;margin:0 auto;padding:14px 16px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

  /* === CSS GENERAL === */
  .icon-img {width: 48px; height: 48px; object-fit: contain; vertical-align: middle;}
  .emojiBtn .icon-img {width: 32px; height: 32px;}

  /* Upload & Slider Styles */
  .drop-zone {border: 2px dashed var(--line); background: rgba(15,23,42,0.5); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; color: var(--mut); margin-bottom: 10px;}
  .drop-zone:hover, .drop-zone.dragover {border-color: var(--pri); background: rgba(34,197,94,0.1); color: var(--txt);}
  .slider-container {background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--line);}
  input[type=range] {width: 100%; cursor: pointer; accent-color: var(--pri);}

  /* === DRAG AND DROP STYLES === */
  .tool[draggable="true"] {cursor: grab;}
  .tool[draggable="true"]:active {cursor: grabbing;}
  .tool.dragging {opacity: 0.4; border: 2px dashed var(--mut); background: rgba(0,0,0,0.2);}
  .tool.drag-over {border: 2px solid var(--pri); transform: scale(1.02); box-shadow: 0 0 15px rgba(34,197,94,0.2); z-index: 10;}

  .fam-wrap[draggable="true"] .fam-head { cursor: grab; }
  .fam-wrap[draggable="true"] .fam-head:active { cursor: grabbing; }
  .fam-wrap.dragging { opacity: 0.3; }
  .fam-wrap.drag-over { border: 2px dashed var(--pri) !important; background: rgba(34,197,94,0.05) !important; }

  /* === CATALOG MANAGER STYLES === */
  .cat-header {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 8px;
    margin: 15px 0 8px 0; font-size: 13px; font-weight: 700; color: #f8fafc;
    border: 1px solid transparent; transition: 0.2s;
  }
  .cat-header.drag-target { border-color: var(--pri); background: rgba(34,197,94,0.15); }

  .cat-actions { display:flex; gap:5px; opacity:0.6; transition:0.2s; }
  .cat-header:hover .cat-actions { opacity:1; }
  .icon-btn { padding:4px; background:transparent; border:none; color:var(--mut); cursor:pointer; border-radius:4px; }
  .icon-btn:hover { background:rgba(255,255,255,0.1); color:var(--txt); }
  .icon-btn.del:hover { background:rgba(239,68,68,0.2); color:#fca5a5; }

  .emojiBtn[draggable="true"] { cursor: grab; }
  .emojiBtn.dragging-icon { opacity: 0.3; transform: scale(0.8); }
  .emojiBtn.drag-over-icon { transform: scale(1.1); border-color: var(--pri); background: rgba(34,197,94,0.2); }

  h1{font-size:16px;margin:0;color:#f1f5f9;letter-spacing:.2px; display: flex; align-items: center; gap: 8px;}
  .btn{border:1px solid var(--line);background:linear-gradient(180deg,#16233f,#0f172a);color:var(--txt);padding:9px 11px;border-radius:10px;cursor:pointer}
  .btn:hover{filter:brightness(1.08)}
  .btn.primary{border-color:rgba(34,197,94,.35);box-shadow:0 0 0 1px rgba(34,197,94,.15) inset}
  .btn.danger{border-color:rgba(239,68,68,.35);box-shadow:0 0 0 1px rgba(239,68,68,.15) inset}
  .btn.ghost{background:transparent}
  .spacer{flex:1}
  .pill{font-size:12px;color:var(--mut);border:1px solid var(--line);padding:6px 10px;border-radius:999px;background:rgba(15,23,42,.7)}
  main{max-width:1180px;margin:0 auto;padding:16px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width:980px){.grid{grid-template-columns:1fr}}
  .card{background:linear-gradient(180deg,rgba(17,27,46,.95),rgba(15,23,42,.95));border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
  .card h2{font-size:13px;margin:0;padding:12px 14px;border-bottom:1px solid var(--line);color:#f8fafc;letter-spacing:.2px}
  .card .content{padding:12px 14px}
  .tools{display:block;}

  .tool{position:relative;border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#101a32,#0b1220);padding:10px;cursor:pointer; transition: transform 0.2s, border-color 0.2s; margin-bottom: 8px;}
  .tool.selected{outline:2px solid rgba(34,197,94,.55);box-shadow:0 0 0 2px rgba(34,197,94,.15)}
  .tool .name{font-weight:650;margin:0 0 6px 0;font-size:13px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .tool .name svg{display:block;}
  .tool .meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--mut);font-size:12px}

  .badge{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:3px 8px;background:rgba(2,6,23,.35)}
  .badge.ok{border-color:rgba(34,197,94,.35)}
  .badge.maint{border-color:rgba(245,158,11,.45); color:#fbbf24; background:rgba(245,158,11,.1)}
  .bar{height:7px;border-radius:999px;background:#0b1326;border:1px solid var(--line);overflow:hidden;margin-top:8px}
  .bar > div, .bar > i{height:100%;display:block;background:linear-gradient(90deg,#22c55e,#16a34a)}
  .bar.low > div, .bar.low > i{background:linear-gradient(90deg,#f59e0b,#d97706)}
  .bar.crit > div, .bar.crit > i{background:linear-gradient(90deg,#ef4444,#b91c1c)}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .small{font-size:12px;color:var(--mut)}
  .desktop-only-menu-btn{display:block}
  @media (hover: none) and (pointer: coarse){
    .desktop-only-menu-btn{display:none !important}
  }

  .loan{border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,#101a32,#0b1220);padding:10px;margin-bottom:10px}
  .loan .top{display:flex;gap:10px;align-items:flex-start}
  .loan .top .sp{flex:1}
  .loan .title{margin:0;font-weight:700;font-size:13px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .loan .sub{margin:2px 0 0 0;color:var(--mut);font-size:12px}
  .loan.warn{border-color:rgba(245,158,11,.55)}
  .loan.dang{border-color:rgba(239,68,68,.6)}

  #floating{position:fixed;left:16px;top:auto;right:auto;bottom:16px;z-index:30;display:none}
  #floating .inner{max-width:1180px;margin:0 auto;border:1px solid var(--line);border-radius:16px;background:rgba(15,23,42,.92);backdrop-filter:blur(10px);box-shadow:0 18px 40px rgba(0,0,0,.4);padding:10px 12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  #floating input{background:#0b1326;border:1px solid var(--line);border-radius:10px;padding:9px 10px;color:var(--txt);min-width:220px}

  #floating.dragging { user-select:none; }
  #fbDragHandle{display:inline-flex;align-items:center;gap:6px;cursor:move;user-select:none}
  #fbDragHandle:hover{filter:brightness(1.08)}
  #fbDragHandle .grip{font-size:14px;color:var(--mut)}

  .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:50;background:rgba(0,0,0,.6);backdrop-filter:blur(2px)}
  .modal.aux{z-index:60;} 
  .modal.show{display:flex}
  .modal .panel{width:min(860px,92vw);max-height:86vh;overflow:auto;border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,#101a32,#0b1220);box-shadow:0 22px 60px rgba(0,0,0,.55)}
  .modal .head{display:flex;gap:10px;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line)}
  .modal .head h3{margin:0;font-size:14px}
  .modal .body{padding:12px 14px}
  .form{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media (max-width:820px){.form{grid-template-columns:1fr}}
  label{display:block;font-size:12px;color:var(--mut);margin:0 0 6px}
  input,select,textarea{width:100%;background:#0b1326;border:1px solid var(--line);border-radius:10px;padding:9px 10px;color:var(--txt);outline:none}
  textarea{min-height:80px;resize:vertical}
  .modal .foot{display:flex;gap:10px;justify-content:flex-end;padding:12px 14px;border-top:1px solid var(--line)}

  table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden;border:1px solid var(--line);border-radius:14px}
  th,td{padding:9px 10px;border-bottom:1px solid var(--line);font-size:12px}
  th{color:#e2e8f0;text-align:left;background:rgba(2,6,23,.35)}
  tr:last-child td{border-bottom:none}
  .mono{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace}

  .emojiGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:8px;max-height:50vh;overflow:auto;padding:6px}
  .emojiBtn{font-size:26px;padding:8px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);cursor:pointer; transition: transform 0.1s; display:flex; align-items:center; justify-content:center; overflow:hidden;}
  .emojiBtn:active{transform:scale(0.9)}
  .emojiBtn:hover{background:rgba(255,255,255,.12)}

  .check{display:flex; align-items:center; gap:8px; padding:6px; border-radius:6px; cursor:pointer;}
  .check:hover{background:rgba(255,255,255,0.05)}
  .check input{width:auto;}
  .maint-stat{display:flex; gap:12px; margin-bottom:12px; padding:10px; background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.3); border-radius:10px; color:#fbbf24; font-size:13px;}

  /* ===== MODO TABLET / TACTIL (NO AFECTA A PC) ===== */
  @media (hover: none) and (pointer: coarse) {
    body { -webkit-tap-highlight-color: transparent; }
    header .wrap, main, .wrap { padding-left: 12px; padding-right: 12px; }
    .btn,
    input,
    select,
    textarea {
      min-height: 46px;
      font-size: 16px;
    }
    .icon-btn {
      min-width: 38px;
      min-height: 38px;
    }
    .pill {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
    }
    .row {
      gap: 12px;
    }
    header .row {
      align-items: stretch;
    }
    header .btn {
      flex: 0 0 auto;
    }
    .tool {
      padding: 12px;
      margin-bottom: 10px;
    }
    .tool .row:last-child,
    .loan .top {
      flex-wrap: wrap;
    }
    .tool .row:last-child .btn,
    .loan .top .btn {
      flex: 1 1 140px;
      min-height: 44px;
    }
    .tool .ico,
    .loan .title img,
    .loan .title svg {
      pointer-events: none;
    }
    #floating .inner {
      width: min(96vw, 760px);
      padding: 12px;
    }
    #floating input {
      min-width: 100%;
      flex: 1 1 100%;
    }
    #floating .btn {
      flex: 1 1 160px;
    }
    #fbDragHandle {
      cursor: default;
    }
    .modal .panel {
      width: min(96vw, 860px);
      max-height: 90vh;
    }
    .modal .foot {
      flex-wrap: wrap;
    }
    .modal .foot .btn {
      flex: 1 1 140px;
    }
    th, td {
      font-size: 13px;
    }
    .cat-actions {
      opacity: 1;
    }
  }

  @media (max-width: 900px) and (hover: none) and (pointer: coarse) {
    .tool .row:first-child {
      align-items: flex-start;
    }
    .tool .row:first-child > div:last-child {
      width: 100%;
      justify-content: flex-start;
      flex-wrap: wrap;
    }
    .loan .top > div:last-child {
      width: 100%;
    }
    .emojiGrid {
      grid-template-columns: repeat(auto-fill, minmax(62px, 1fr));
    }
  }
</style>

<script type="module" src="cloud_sync.js"></script>

<script>
const IS_TOUCH = window.matchMedia("(hover: none) and (pointer: coarse)").matches;

/* ========= Persistencia ========= */
const DB_KEY = "tool_loans_db_v14_lib"; 
const CFG_KEY = "tool_loans_cfg_v14_lib";

window.DB_KEY = DB_KEY;
window.CFG_KEY = CFG_KEY;

const nowIso = () => new Date().toISOString();
const uid = () => Math.random().toString(36).slice(2,10)+Math.random().toString(36).slice(2,8);
const clampInt = (v, min, max) => {
  const n = Number.parseInt(String(v||"").replace(",", "."), 10);
  if (Number.isNaN(n)) return null;
  return Math.max(min, Math.min(max, n));
};
const normName = (s) => String(s||"").trim().replace(/\s+/g," ");
const normOp = (s) => {
  const t = normName(s);
  if(!t) return "";
  return t.split(" ").map(w=>w ? (w[0].toUpperCase()+w.slice(1).toLowerCase()) : "").join(" ");
};
const esc = (s) => String(s||"").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

const renderIcon = (s) => {
  if(!s) return "🧰";
  if(String(s).startsWith("data:image")) return `<img src="${s}" class="icon-img" alt="icon"/>`;
  if(String(s).includes("</svg>")) return s; 
  return esc(s);
};

function processImage(file, callback) {
  if(!file.type.startsWith("image/")) return alert("No es una imagen");
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const MAX_SIZE = 64; 
      let w = img.width, h = img.height;
      if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } }
      else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/png'));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

let db = { tools: [], history: [], library: null, familyOrder: [], operators: [] }; 
let cfg = { warnDays: 7, dangerDays: 30, familyOpen: {}, floatingPos: null };
let selected = new Set();
let dragSrcIndex = null; 
let draggedIcon = null;  
let dragType = null;
let dragSrcId = null;

const $ = (id)=>document.getElementById(id);
const invTools = $("invTools");
const useList = $("useList");
const floating = $("floating");
const fbOperario = $("fbOperario");
const fbRecoge = $("fbRecoge");
const dlOps = $("dlOps");
const statusPill = $("statusPill");

function applyFloatingPos(){
  const el = $("floating");
  if(!el) return;
  if(cfg && cfg.floatingPos && typeof cfg.floatingPos.x==="number" && typeof cfg.floatingPos.y==="number" && !IS_TOUCH){
    el.style.left = cfg.floatingPos.x + "px";
    el.style.top = cfg.floatingPos.y + "px";
    el.style.right = "auto";
    el.style.bottom = "auto";
  } else {
    el.style.left = "16px";
    el.style.top = "auto";
    el.style.right = "auto";
    el.style.bottom = "16px";
  }
}

function setupFloatingDrag(){
  const el = $("floating");
  const handle = $("fbDragHandle");
  if(!el || !handle) return;

  applyFloatingPos();
  if(IS_TOUCH) return;

  let dragging = false;
  let sx=0, sy=0, ox=0, oy=0;

  const onMove = (e) => {
    if(!dragging) return;
    e.preventDefault();
    const dx = e.clientX - sx;
    const dy = e.clientY - sy;
    let nx = ox + dx;
    let ny = oy + dy;
    const rect = el.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    nx = Math.max(6, Math.min(vw - rect.width - 6, nx));
    ny = Math.max(6, Math.min(vh - rect.height - 6, ny));
    el.style.left = nx + "px";
    el.style.top = ny + "px";
    el.style.right = "auto";
    el.style.bottom = "auto";
  };

  const onUp = () => {
    if(!dragging) return;
    dragging = false;
    el.classList.remove("dragging");
    document.removeEventListener("pointermove", onMove, true);
    document.removeEventListener("pointerup", onUp, true);
    const left = parseFloat(el.style.left);
    const top = parseFloat(el.style.top);
    if(!Number.isNaN(left) && !Number.isNaN(top)){
      cfg.floatingPos = {x: left, y: top};
      saveAll();
    }
  };

  handle.addEventListener("pointerdown", (e)=>{
    if(el.style.display === "none") return;
    dragging = true;
    el.classList.add("dragging");
    sx = e.clientX;
    sy = e.clientY;
    const r = el.getBoundingClientRect();
    ox = r.left;
    oy = r.top;
    el.style.left = ox + "px";
    el.style.top = oy + "px";
    el.style.right = "auto";
    el.style.bottom = "auto";
    document.addEventListener("pointermove", onMove, true);
    document.addEventListener("pointerup", onUp, true);
  });

  handle.addEventListener("dblclick", ()=>{
    cfg.floatingPos = null;
    saveAll();
    applyFloatingPos();
  });

  window.addEventListener("resize", ()=>{ applyFloatingPos(); });
}

function showModal(title, bodyHtml, footButtons){
  $("mTitle").textContent = title;
  $("mBody").innerHTML = bodyHtml;
  const foot = $("mFoot");
  foot.innerHTML = "";
  for(const b of (footButtons||[])){
    const btn = document.createElement("button");
    btn.className = b.className || "btn";
    btn.textContent = b.text;
    btn.addEventListener("click", b.onClick);
    foot.appendChild(btn);
  }
  $("modal").classList.add("show");
}
function closeModal(){ $("modal").classList.remove("show"); }
$("mClose").addEventListener("click", closeModal);

function showAuxModal(title, bodyHtml, footButtons){
  $("aTitle").textContent = title;
  $("aBody").innerHTML = bodyHtml;
  const foot = $("aFoot");
  foot.innerHTML = "";
  for(const b of (footButtons||[])){
    const btn = document.createElement("button");
    btn.className = b.className || "btn";
    btn.textContent = b.text;
    btn.addEventListener("click", b.onClick);
    foot.appendChild(btn);
  }
  $("auxModal").classList.add("show");
}

function loadAll(){
  try{ const raw = localStorage.getItem(DB_KEY); if(raw) db = JSON.parse(raw); }catch(_){ db = {tools:[],history:[], library:null}; }

  if(!db || !Array.isArray(db.tools)) db = {tools:[],history:[], library:null};
  if(!db.library) db.library = JSON.parse(JSON.stringify(DEFAULT_LIB));
  if(!db.library["Mis Iconos"]) db.library["Mis Iconos"] = [];

  for(const t of db.tools){
    if(!Array.isArray(t.loans)) t.loans = [];
    if(!Array.isArray(t.serials)) t.serials = [];
    if(!Array.isArray(t.maintSerials)) t.maintSerials = [];
    if(typeof t.maintQty !== 'number') t.maintQty = 0;
    if(typeof t.stock !== 'number') t.stock = 0;
    for(const l of (t.loans||[])){
      if(!l.operator) l.operator = "";
      if(!l.pickupBy) l.pickupBy = l.operator;
    }
  }

  if(!Array.isArray(db.familyOrder)) db.familyOrder = [];
  syncFamilyOrder();

  if(!Array.isArray(db.operators)){
      db.operators = [];
      const tempSet = new Set();
      [...db.history, ...db.tools.flatMap(t=>t.loans)].forEach(item => {
          if(item.operator) tempSet.add(item.operator.trim());
      });
      tempSet.forEach(name => {
         if(name) db.operators.push({ id: uid(), name: name, phone: "", dept: "" });
      });
  }

  try{ const rawC = localStorage.getItem(CFG_KEY); if(rawC) cfg = {...cfg, ...JSON.parse(rawC)}; }catch(_){}
  if(cfg.warnHours) { cfg.warnDays = 7; delete cfg.warnHours; }
  if(cfg.dangerHours) { cfg.dangerDays = 30; delete cfg.dangerHours; }
}

function syncFamilyOrder(){
    const currentKeys = Object.keys(db.library);
    currentKeys.forEach(k => {
        if(!db.familyOrder.includes(k)) db.familyOrder.push(k);
    });
    db.familyOrder = db.familyOrder.filter(k => currentKeys.includes(k) || k === "Sin familia");
}

function saveAll(){
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
}

function toolsInUseCount(t){ return (t.loans||[]).reduce((a,l)=>a + (l.qty||0), 0); }
function toolsInMaintCount(t){ 
  if(t.mode==="serial") return (t.maintSerials||[]).length;
  return (t.maintQty||0);
}
function toolsFreeQty(t){ 
  const total = t.stock || 0;
  const used = toolsInUseCount(t);
  const maint = toolsInMaintCount(t);
  return Math.max(0, total - used - maint); 
}
function isCritical(t){
  const free = toolsFreeQty(t);
  return free <= 0 || free <= Math.max(1, Math.floor((t.stock||0)*0.20));
}

function daysSince(iso){ 
  const diffMs = Date.now() - new Date(iso).getTime();
  const days = diffMs / (1000 * 60 * 60 * 24);
  return Math.max(0, days);
}

function hydrateOperators(){
  dlOps.innerHTML = "";
  const sorted = [...db.operators].sort((a,b) => a.name.localeCompare(b.name));
  sorted.forEach(op => {
      const opt = document.createElement("option");
      opt.value = op.name;
      if(op.dept || op.phone) {
          opt.label = `${op.dept ? op.dept : ''} ${op.phone ? '📞'+op.phone : ''}`;
      }
      dlOps.appendChild(opt);
  });
}

function updateStatus(){
  const total = db.tools.length;
  const activeLoans = db.tools.reduce((a,t)=>a + ((t.loans||[]).length), 0);
  const inMaint = db.tools.reduce((a,t)=>a + toolsInMaintCount(t), 0);
  statusPill.textContent = `Items: ${total} · Activos: ${activeLoans} · Reparación: ${inMaint}`;
}

function familyOfTool(t){
  const icon=(t.icon||"").trim();
  if(!icon) return "Sin familia";
  for(const [fam, arr] of Object.entries(db.library||{})){
    if(Array.isArray(arr) && arr.includes(icon)) return fam;
  }
  return "Sin familia";
}

function render(){
  updateStatus();
  hydrateOperators();
  syncFamilyOrder();

  $("invEmpty").style.display = db.tools.length ? "none" : "block";
  const sort = $("sortInv").value;
  const search = normName($("invSearch").value).toLowerCase();

  let list = [];
  if (sort === "manual") {
      list = db.tools.map((t, idx) => ({ ...t, originalIndex: idx }));
  } else {
      list = [...db.tools];
      if(sort==="name") list.sort((a,b)=>a.name.localeCompare(b.name));
      if(sort==="free") list.sort((a,b)=>toolsFreeQty(b)-toolsFreeQty(a));
      if(sort==="crit") list.sort((a,b)=>{
        const ac = isCritical(a)?1:0, bc = isCritical(b)?1:0;
        if(ac!==bc) return bc-ac;
        return a.name.localeCompare(b.name);
      });
  }

  if(search) {
      list = list.filter(t => t.name.toLowerCase().includes(search));
  }

  invTools.innerHTML = "";
  const famBuckets = {};
  for(const t of list){
    const fam = familyOfTool(t);
    (famBuckets[fam] = famBuckets[fam] || []).push(t);
  }

  let fams = [...db.familyOrder];
  if(famBuckets["Sin familia"] && !fams.includes("Sin familia")) fams.push("Sin familia");
  fams = fams.filter(f => famBuckets[f] && famBuckets[f].length > 0);

  for(const fam of fams){
    const wrap=document.createElement("div");
    wrap.className = "fam-wrap";
    wrap.setAttribute("data-fam", fam);
    wrap.style.border="1px solid var(--line)";
    wrap.style.borderRadius="14px";
    wrap.style.marginBottom="10px";
    wrap.style.overflow="hidden";
    wrap.style.background="rgba(255,255,255,0.03)";

    if(!IS_TOUCH && !search) {
        wrap.draggable = true;
        wrap.ondragstart = (e) => handleFamDragStart(e, fam);
        wrap.ondragover = (e) => handleFamDragOver(e);
        wrap.ondragleave = (e) => handleFamDragLeave(e);
        wrap.ondrop = (e) => handleFamDrop(e, fam);
    }

    const head=document.createElement("div");
    head.className = "fam-head"; 
    head.style.display="flex";
    head.style.justifyContent="space-between";
    head.style.alignItems="center";
    head.style.padding="10px 12px";
    head.style.background="rgba(0,0,0,0.18)";
    head.style.cursor="pointer"; 
    head.innerHTML = `<div><b>${esc(fam)}</b> <span style="color:var(--mut);font-size:12px">(${famBuckets[fam].length})</span> ${!IS_TOUCH && !search ? '<span style="font-size:10px;color:var(--mut)">::</span>' : ''}</div><div style="color:var(--mut);font-size:12px">▼</div>`;

    const body=document.createElement("div");
    body.style.padding="10px";

    const isOpen = search ? true : (cfg.familyOpen && cfg.familyOpen[fam] === true);
    body.style.display = isOpen ? "block" : "none";

    head.addEventListener("click", ()=>{
      const isHidden = body.style.display === "none";
      body.style.display = isHidden ? "block" : "none";
      if(!cfg.familyOpen) cfg.familyOpen = {};
      cfg.familyOpen[fam] = isHidden;
    });

    for(const t of famBuckets[fam]){
      const free = toolsFreeQty(t);
      const used = toolsInUseCount(t);
      const maint = toolsInMaintCount(t);
      const pct = t.stock ? Math.round((free/t.stock)*100) : 0;
      const barClass = free<=0 ? "crit" : (free<=1 ? "low" : "");
      const selClass = selected.has(t.id) ? "selected" : "";

      const tool = document.createElement("div");
      tool.className = `tool ${selClass}`;

      if(!IS_TOUCH && !search){
          tool.draggable = true;
          tool.ondragstart = (e) => handleToolDragStart(e, t.id);
          tool.ondragover = (e) => handleToolDragOver(e);
          tool.ondragleave = (e) => handleToolDragLeave(e);
          tool.ondrop = (e) => handleToolDrop(e, t.id);
      }

      tool.onclick = (e)=>{
        if(e.target.closest(".btn") || e.target.closest("input") || e.target.closest("select")) return;
        toggleSelect(t.id);
      };

      tool.innerHTML = `
        <div class="row">
          <div class="ico">${renderIcon(t.icon)}</div>
          <div style="flex:1;min-width:140px">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
              <div class="name">${esc(t.name)}</div>
              <div class="kpis">${used?`<span class="pill warn">En uso ${used}</span>`:""}${maint?`<span class="pill danger">Reparación ${maint}</span>`:""}</div>
            </div>
            <div class="meta">Stock: <b>${t.stock}</b> · Libres: <b>${free}</b></div>
            <div class="bar ${barClass}"><i style="width:${pct}%;"></i></div>
          </div>
          <div class="row" style="gap:6px">
            <button class="btn" type="button" onclick="openEdit('${t.id}')">Editar</button>
            <button class="btn" type="button" onclick="openLoanAction('${t.id}')">Prestar</button>
            <button class="btn" type="button" onclick="openMaintManager('${t.id}')">Reparación</button>
            <button class="btn danger" type="button" onclick="deleteTool('${t.id}')">Eliminar</button>
          </div>
        </div>
      `;
      body.appendChild(tool);
    }

    wrap.appendChild(head);
    wrap.appendChild(body);
    invTools.appendChild(wrap);
  }

  const opBuckets = {};
  let totalLoans = 0;

  db.tools.forEach(t => {
    (t.loans||[]).forEach(l => {
      const op = normOp(l.operator) || "—";
      if(!opBuckets[op]) opBuckets[op] = [];
      opBuckets[op].push({tool:t, loan:l});
      totalLoans++;
    });
  });

  for(const op in opBuckets){
    opBuckets[op].sort((a,b)=> new Date(a.loan.outAt)-new Date(b.loan.outAt));
  }

  $("useEmpty").style.display = totalLoans ? "none" : "block";
  useList.innerHTML = "";

  const opNames = Object.keys(opBuckets).sort((a,b)=>a.localeCompare(b));

  for(const op of opNames){
    const wrap = document.createElement("div");
    wrap.className = "fam-wrap";
    wrap.style.border="1px solid var(--line)";
    wrap.style.borderRadius="14px";
    wrap.style.marginBottom="10px";
    wrap.style.overflow="hidden";
    wrap.style.background="rgba(255,255,255,0.03)";

    const head = document.createElement("div");
    head.className = "fam-head";
    head.style.display="flex";
    head.style.justifyContent="space-between";
    head.style.alignItems="center";
    head.style.padding="10px 12px";
    head.style.background="rgba(255,100,0,0.05)";
    head.style.cursor="pointer";
    head.innerHTML = `<div><b>${esc(op)}</b> <span style="color:var(--mut);font-size:12px">(${opBuckets[op].length})</span></div><div style="color:var(--mut);font-size:12px">▼</div>`;

    const body = document.createElement("div");
    body.style.padding="10px";

    const openKey = 'use_op_' + op;
    const isOpen = cfg.familyOpen && cfg.familyOpen[openKey] === true;
    body.style.display = isOpen ? "block" : "none";

    head.addEventListener("click", ()=>{
      const isHidden = body.style.display === "none";
      body.style.display = isHidden ? "block" : "none";
      if(!cfg.familyOpen) cfg.familyOpen = {};
      cfg.familyOpen[openKey] = isHidden;
    });

    for(const {tool, loan} of opBuckets[op]){
      const d = daysSince(loan.outAt);
      const st = (d >= cfg.dangerDays) ? "dang" : (d >= cfg.warnDays ? "warn" : "ok");
      const titleEx = loan.variant ? `(${esc(loan.variant)})` : "";
      const pickup = normOp(loan.pickupBy || loan.operator);
      const pickupLine = pickup && pickup !== op ? ` · Recoge: <b>${esc(pickup)}</b>` : "";

      const card = document.createElement("div");
      card.className = `loan ${st}`;
      card.innerHTML = `
        <div class="top">
          <div class="sp">
            <div class="title">${renderIcon(tool.icon)} ${esc(tool.name)} ${titleEx} · <span class="mono">x${loan.qty}</span></div>
            <p class="sub">Para: <b>${esc(op)}</b>${pickupLine} · Zona: ${esc(loan.zone||"—")}</p>
            <p class="sub">Salida: ${new Date(loan.outAt).toLocaleDateString()} · Antigüedad: ${d.toFixed(1)} días</p>
            ${loan.mode==="serial" ? `<p class="sub mono">Series: ${(loan.serials||[]).join(", ")}</p>` : ""}
            ${loan.notes ? `<p class="sub">📝 ${esc(loan.notes)}</p>` : ""}
          </div>
          <div class="row" style="gap:8px; justify-content:flex-end">
            <button class="btn" data-act="xfer">Cambiar operario</button>
            <button class="btn primary" data-act="return">Devolver</button>
          </div>
        </div>
      `;
      card.querySelector('[data-act="return"]').addEventListener("click", ()=>openReturn(tool.id, loan.id));
      card.querySelector('[data-act="xfer"]').addEventListener("click", ()=>openTransfer(tool.id, loan.id));
      body.appendChild(card);
    }

    wrap.appendChild(head);
    wrap.appendChild(body);
    useList.appendChild(wrap);
  }

  const repListEl = document.getElementById("repList");
  const repEmptyEl = document.getElementById("repEmpty");
  if(repListEl && repEmptyEl){
    repListEl.innerHTML = "";
    const repBuckets = {};
    let repCount = 0;
    for(const tool of db.tools){
      const m = toolsInMaintCount(tool);
      if(m>0){
        const fam = familyOfTool(tool);
        if(!repBuckets[fam]) repBuckets[fam] = [];
        repBuckets[fam].push({tool, m});
        repCount += m;
      }
    }
    repEmptyEl.style.display = repCount ? "none" : "block";

    const fams = Object.keys(repBuckets).sort((a,b)=>a.localeCompare(b));
    for(const fam of fams){
      const wrap = document.createElement("div");
      wrap.style.border="1px solid var(--line)";
      wrap.style.borderRadius="14px";
      wrap.style.marginBottom="10px";
      wrap.style.overflow="hidden";
      wrap.style.background="rgba(255,255,255,0.03)";

      const head = document.createElement("div");
      head.className = "fam-head";
      head.style.display="flex";
      head.style.justifyContent="space-between";
      head.style.alignItems="center";
      head.style.padding="10px 12px";
      head.style.background="rgba(245,158,11,0.08)";
      head.style.cursor="pointer";
      head.innerHTML = `<div><b>${esc(fam)}</b> <span style="color:var(--mut);font-size:12px">(${repBuckets[fam].length})</span></div><div style="color:var(--mut);font-size:12px">▼</div>`;

      const body = document.createElement("div");
      body.style.padding="10px";
      const openKey = 'rep_' + fam;
      const isOpen = cfg.familyOpen && cfg.familyOpen[openKey] === true;
      body.style.display = isOpen ? "block" : "none";
      head.addEventListener("click", ()=>{
        const isHidden = body.style.display === "none";
        body.style.display = isHidden ? "block" : "none";
        if(!cfg.familyOpen) cfg.familyOpen = {};
        cfg.familyOpen[openKey] = isHidden;
      });

      repBuckets[fam].sort((a,b)=>a.tool.name.localeCompare(b.tool.name));

      for(const {tool, m} of repBuckets[fam]){
        const row = document.createElement("div");
        row.className = "loan warn";
        const serialLine = (tool.mode==="serial" && (tool.maintSerials||[]).length) ? `<p class="sub mono">Series: ${(tool.maintSerials||[]).join(", ")}</p>` : "";
        row.innerHTML = `
          <div class="top">
            <div class="sp">
              <div class="title">${renderIcon(tool.icon)} ${esc(tool.name)} · <span class="mono">${tool.mode==="serial" ? ("x"+(tool.maintSerials||[]).length) : ("x"+(tool.maintQty||0))}</span></div>
              <p class="sub">En reparación: <b>${m}</b> · Libres: <b>${toolsFreeQty(tool)}</b> · Stock: <b>${tool.stock||0}</b></p>
              ${serialLine}
            </div>
            <div><button class="btn" data-act="mng">Gestionar</button></div>
          </div>
        `;
        row.querySelector('[data-act="mng"]').addEventListener("click", ()=>openMaintManager(tool.id));
        body.appendChild(row);
      }

      wrap.appendChild(head);
      wrap.appendChild(body);
      repListEl.appendChild(wrap);
    }
  }

  $("selCount").textContent = String(selected.size);
  $("selHint").textContent = selected.size ? "Listo para prestar." : "";
  applyFloatingPos();
  floating.style.display = selected.size ? "block" : "none";
}

function toggleSelect(id){
  if(selected.has(id)) selected.delete(id); else selected.add(id);
  render();
}

function handleFamDragStart(e, famName){
    if(IS_TOUCH) return;
    if(e.target.closest('.tool')) return;
    dragType = 'family';
    dragSrcId = famName;
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.classList.add('dragging');
}
function handleFamDragOver(e){
    if(IS_TOUCH || dragType !== 'family') return;
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
}
function handleFamDragLeave(e){
    e.currentTarget.classList.remove('drag-over');
}
function handleFamDrop(e, targetFam){
    if(IS_TOUCH || dragType !== 'family') return;
    e.preventDefault();
    e.stopPropagation();
    const wrap = e.currentTarget;
    if(wrap) wrap.classList.remove('drag-over');

    const srcFam = dragSrcId;
    if(srcFam !== targetFam){
        const srcIdx = db.familyOrder.indexOf(srcFam);
        const tgtIdx = db.familyOrder.indexOf(targetFam);
        if(srcIdx > -1 && tgtIdx > -1){
             db.familyOrder.splice(srcIdx, 1);
             db.familyOrder.splice(tgtIdx, 0, srcFam);
             saveAll();
             render();
        }
    }
}

function handleToolDragStart(e, toolId){
    if(IS_TOUCH) return;
    dragType = 'tool';
    dragSrcId = toolId;
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.classList.add('dragging');
    e.stopPropagation();
}
function handleToolDragOver(e){
    if(IS_TOUCH || dragType !== 'tool') return;
    e.preventDefault();
    const t = e.currentTarget.closest('.tool') || e.currentTarget;
    if(t) t.classList.add('drag-over');
}
function handleToolDragLeave(e){
    const t = e.currentTarget.closest('.tool') || e.currentTarget;
    if(t) t.classList.remove('drag-over');
}
function handleToolDrop(e, targetId){
    if(IS_TOUCH || dragType !== 'tool') return;
    e.preventDefault();
    e.stopPropagation();

    const sortSelect = $("sortInv");
    if(sortSelect.value !== "manual"){
        sortSelect.value = "manual";
    }

    const srcId = dragSrcId;
    if(srcId !== targetId){
        const srcIdx = db.tools.findIndex(t => t.id === srcId);
        const tgtIdx = db.tools.findIndex(t => t.id === targetId);

        if(srcIdx > -1 && tgtIdx > -1){
            const [item] = db.tools.splice(srcIdx, 1);
            db.tools.splice(tgtIdx, 0, item);
            saveAll();
            render();
        }
    }
}

function openNew(){
  showModal("Nueva herramienta", `
    <div class="form">
      <div><label>Nombre</label><input id="tName" placeholder="Ej. Llave Fija"/></div>
      <div><label>Icono</label><div style="display:flex;gap:5px"><input id="tIcon" placeholder="Ej. 🔧" style="flex:1"/><button class="btn" type="button" id="btnPickIcon">📚</button></div></div>
      <div><label>Stock Total</label><input id="tStock" inputmode="numeric" placeholder="Cantidad comprada"/></div>
      <div><label>Modo</label><select id="tMode"><option value="qty">Cantidad</option><option value="serial">Por Serie</option></select></div>
      <div><label>Series (si aplica)</label><textarea id="tSerials" placeholder="Una por línea" disabled></textarea></div>
    </div>
  `, [
    {text:"Cancelar", className:"btn", onClick: closeModal},
    {text:"Guardar", className:"btn primary", onClick: ()=>{
      const name = normName($("tName").value);
      if(!name) return alert("Nombre obligatorio");
      const icon = $("tIcon").value;
      const mode = $("tMode").value;
      let stock = clampInt($("tStock").value,0,9999);
      let serials = [];
      if(mode==="serial"){
        serials = $("tSerials").value.split("\n").map(normName).filter(Boolean);
        if(!serials.length) return alert("Indica las series");
        stock = serials.length;
      } else {
        if(stock===null) return alert("Stock inválido");
      }
      db.tools.push({id:uid(), name, icon, stock, mode, serials, maintQty:0, maintSerials:[], notes:"", loans:[]});
      saveAll(); closeModal(); render();
    }}
  ]);
  $("tMode").addEventListener("change", e => $("tSerials").disabled = (e.target.value!=="serial"));
  setTimeout(()=>{
      const btn = $("btnPickIcon");
      if(btn) btn.onclick = () => openCatalogManager(true, (val) => {

function deleteTool(id){
  const t = db.tools.find(x=>x.id===id);
  if(toolsInUseCount(t)>0) return alert("Tiene préstamos activos. Devuélvelos primero.");
  if(confirm(`¿Eliminar ${t.name}?`)){
    db.tools = db.tools.filter(x=>x.id!==id);
    selected.delete(id);
    saveAll(); render();
  }
}

function openMaintManager(id){
  const t = db.tools.find(x=>x.id===id); if(!t) return;
  const inMaint = toolsInMaintCount(t);
  const free = toolsFreeQty(t);
  let content = `
    <div class="maint-stat">
      <div>Libres: <b>${free}</b></div>
      <div>En Reparación: <b>${inMaint}</b></div>
    </div>
    <div class="grid">
      <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px">
        <label>Enviar a Reparación</label>
        <button class="btn danger" id="btnToMaint" ${free<=0?'disabled':''}>⬇ Averiada</button>
      </div>
      <div style="background:rgba(0,0,0,0.2); padding:10px; border-radius:8px">
        <label>Volver a Operativa</label>
        <button class="btn primary" id="btnFromMaint" ${inMaint<=0?'disabled':''}>⬆ Reparada</button>
      </div>
    </div>
  `;
  showModal(`Reparación: ${esc(t.name)}`, content, [{text:"Cerrar", className:"btn", onClick:closeModal}]);
  $("btnToMaint").onclick = () => doSendMaint(t);
  $("btnFromMaint").onclick = () => doReturnMaint(t);
}
function doSendMaint(t){
  const free = toolsFreeQty(t);
  if(t.mode === 'qty'){
    showModal("Enviar a Reparación", `<label>Cantidad (Máx ${free})</label><input id="mqty" type="number" value="1" min="1" max="${free}"/>`, [
      {text:"Cancelar", className:"btn", onClick: ()=>openMaintManager(t.id)}, 
      {text:"Confirmar", className:"btn danger", onClick: ()=>{
        const q = clampInt($("mqty").value, 1, free);
        if(q) { t.maintQty += q; saveAll(); openMaintManager(t.id); render(); }
      }}
    ]);
  } else {
    const used = new Set(t.loans.flatMap(l=>l.serials));
    const maint = new Set(t.maintSerials);
    const available = t.serials.filter(s => !used.has(s) && !maint.has(s));
    const checks = available.map(s => `<label class="check"><input type="checkbox" value="${esc(s)}"/> ${esc(s)}</label>`).join("");
    showModal("Enviar a Reparación", `<div class="checks">${checks||"No hay libres"}</div>`, [
      {text:"Cancelar", className:"btn", onClick: ()=>openMaintManager(t.id)},
      {text:"Confirmar", className:"btn danger", onClick: ()=>{
        const sel = [...document.querySelectorAll(".checks input:checked")].map(i=>i.value);
        if(sel.length){ t.maintSerials.push(...sel); saveAll(); openMaintManager(t.id); render(); }
      }}
    ]);
  }
}
function doReturnMaint(t){
  const inMaint = toolsInMaintCount(t);
  if(t.mode === 'qty'){
    showModal("Sacar de Reparación", `<label>Cantidad (Máx ${inMaint})</label><input id="umqty" type="number" value="1" min="1" max="${inMaint}"/>`, [
      {text:"Cancelar", className:"btn", onClick: ()=>openMaintManager(t.id)},
      {text:"Recuperar", className:"btn primary", onClick: ()=>{
        const q = clampInt($("umqty").value, 1, inMaint);
        if(q) { t.maintQty = Math.max(0, t.maintQty - q); saveAll(); openMaintManager(t.id); render(); }
      }}
    ]);
  } else {
    const checks = t.maintSerials.map(s => `<label class="check"><input type="checkbox" value="${esc(s)}"/> ${esc(s)}</label>`).join("");
    showModal("Sacar de Reparación", `<div class="checks">${checks}</div>`, [
      {text:"Cancelar", className:"btn", onClick: ()=>openMaintManager(t.id)},
      {text:"Recuperar", className:"btn primary", onClick: ()=>{
        const sel = [...document.querySelectorAll(".checks input:checked")].map(i=>i.value);
        if(sel.length){ t.maintSerials = t.maintSerials.filter(s => !sel.includes(s)); saveAll(); openMaintManager(t.id); render(); }
      }}
    ]);
  }
}

function openBatchLoan(){
  const para = normOp(fbOperario.value);
  const recoge0 = normOp((fbRecoge && fbRecoge.value) || "");
  const recoge = recoge0 || para;
  if(!para) {
      if(selected.size > 0) alert("Escribe 'Para' (operario destino) en la barra flotante");
      return;
  }
  const list = db.tools.filter(t=>selected.has(t.id));
  if(!list.length) return alert("Selecciona herramientas");
  const rows = list.map(t=>{
    const free = toolsFreeQty(t);
    const usedS = new Set(t.loans.flatMap(l=>l.serials));
    const maintS = new Set(t.maintSerials);
    const availS = (t.serials||[]).filter(s => !usedS.has(s) && !maintS.has(s));
    let inputHtml = "";
    if(t.mode==="serial"){
       const opts = availS.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");
       inputHtml = `<select multiple data-id="${t.id}" data-type="serial" size="${Math.min(5,availS.length||1)}" style="min-width:150px">${opts}</select>`;
    } else {
       inputHtml = `<input type="number" data-id="${t.id}" data-type="qty" min="0" max="${free}" placeholder="0"/>`;
    }
    return `<tr><td>${renderIcon(t.icon)} ${t.name}</td><td>${free}</td><td><input data-id="${t.id}" data-type="variant" placeholder="Ej: 13, Pared 12..." style="font-size:12px"/></td><td>${inputHtml}</td></tr>`;
  }).join("");
  showModal("Confirmar Préstamo", `
    <div class="form">
      <div><label>Para (operario destino)</label><input id="lPara" value="${esc(para)}"/></div>
      <div><label>Recoge (quién lo retira)</label><input id="lRecoge" value="${esc(recoge)}" placeholder="Si lo recoge el mismo, deja igual"/></div>
      <div><label>Zona / Obra</label><input id="lZone"/></div>
      <div style="grid-column:1/-1"><label>Notas generales</label><textarea id="lNotes"></textarea></div>
    </div>
    <table style="margin-top:10px"><thead><tr><th>Item</th><th>Libre</th><th>Detalle/Medida</th><th>Selección</th></tr></thead><tbody>${rows}</tbody></table>
  `, [
    {text:"Cancelar", className:"btn", onClick: closeModal},
    {text:"Prestar", className:"btn primary", onClick: ()=>{
      const para2 = normOp($("lPara").value);
      if(!para2) return alert("Falta 'Para' (operario destino)");
      const recoge2 = normOp($("lRecoge").value) || para2;
      const zone = normName($("lZone").value);
      const notes = normName($("lNotes").value);
      const items = [];
      document.querySelectorAll('tbody tr').forEach(tr => {
          const qtyInput = tr.querySelector('[data-type="qty"], [data-type="serial"]');
          const varInput = tr.querySelector('[data-type="variant"]');
          const tid = qtyInput.getAttribute("data-id");
          const type = qtyInput.getAttribute("data-type");
          const t = db.tools.find(x=>x.id===tid);
          const variant = normName(varInput.value);
          if(type==="qty"){
            const q = parseInt(qtyInput.value);
            if(q>0) items.push({t, qty:q, serials:[], mode:'qty', variant});
          } else {
            const s = [...qtyInput.selectedOptions].map(o=>o.value);
            if(s.length) items.push({t, qty:s.length, serials:s, mode:'serial', variant});
          }
      });
      if(!items.length) return alert("No has seleccionado cantidades");
      const outAt = nowIso();
      items.forEach(({t, qty, serials, mode, variant}) => {
          const l = {id:uid(), operator:para2, pickupBy:recoge2, zone, qty, mode, serials, outAt, notes, variant};
          t.loans.push(l);
          db.history.push({id:uid(), type:"OUT", toolId:t.id, toolName:t.name, operator:para2, pickupBy:recoge2, zone, qty, serials, outAt, notes, variant});
      });
      fbOperario.value = ""; if(fbRecoge) fbRecoge.value = ""; selected.clear(); saveAll(); closeModal(); render();
    }}
  ]);
}

function openReturn(tid, lid){
  const t = db.tools.find(x=>x.id===tid);
  const l = t.loans.find(x=>x.id===lid);
  if(!l) return;
  showModal("Devolución", `
    <div class="form"><div><label>Herramienta</label><input value="${esc(t.name)} ${l.variant?`(${esc(l.variant)})`:''}" disabled/></div><div><label>Operario</label><input value="${esc(l.operator)}" disabled/></div><div><label>Cant. a devolver (máx ${l.qty})</label><input id="rQty" type="number" value="${l.qty}" max="${l.qty}"/></div><div><label>Estado devuelto</label><select id="rSt"><option value="ok">OK (A stock)</option><option value="inc">Roto (A Reparación)</option></select></div><div style="grid-column:1/-1"><label>Notas</label><textarea id="rNote"></textarea></div></div>
    ${l.mode==='serial' ? `<div class="small mono" style="margin-top:10px">Series: ${l.serials.join(", ")}</div>` : ''}
  `, [
    {text:"Cancelar", className:"btn", onClick:closeModal},
    {text:"Confirmar", className:"btn primary", onClick: ()=>{
       const q = clampInt($("rQty").value, 1, l.qty);
       if(!q) return;
       const status = $("rSt").value;
       const note = $("rNote").value;
       let retSerials = [];
       if(l.mode === 'serial'){ retSerials = l.serials.slice(0, q); l.serials = l.serials.slice(q); }
       l.qty -= q;
       if(l.qty <= 0) t.loans = t.loans.filter(x=>x.id!==lid);
       if(status === 'inc'){ if(t.mode==='serial') t.maintSerials.push(...retSerials); else t.maintQty += q; }
       db.history.push({ id:uid(), type:"IN", toolId:t.id, toolName:t.name, operator:l.operator, qty:q, serials:retSerials, outAt:l.outAt, inAt:nowIso(), status, notes:note, variant:l.variant });
       saveAll(); closeModal(); render();
    }}
  ]);
}

function openTransfer(tid, lid){
  const t = db.tools.find(x=>x.id===tid);
  if(!t) return;
  const l = (t.loans||[]).find(x=>x.id===lid);
  if(!l) return;

  const curPara = normOp(l.operator);
  const curRecoge = normOp(l.pickupBy || l.operator);

  showModal("Cambiar operario (traspaso)", `
    <div class="form">
      <div style="grid-column:1/-1"><label>Herramienta</label><input value="${esc(t.name)} ${l.variant?`(${esc(l.variant)})`:''}" disabled/></div>
      <div><label>Para (nuevo destinatario)</label><input id="xPara" list="dlOps" value="${esc(curPara)}"/></div>
      <div><label>Recoge (quién la entrega/retira)</label><input id="xRecoge" list="dlOps" value="${esc(curRecoge)}"/></div>
      <div style="grid-column:1/-1"><label>Nota (opcional)</label><input id="xNote" placeholder="Ej. Se la cede Juan a Pedro"/></div>
    </div>
    <div class="small" style="margin-top:8px;color:var(--mut)">No pasa por almacén: se mantiene el préstamo activo y solo cambia el operario asignado.</div>
  `, [
    {text:"Cancelar", className:"btn", onClick: closeModal},
    {text:"Guardar cambio", className:"btn primary", onClick: ()=>{
      const newPara = normOp($("xPara").value);
      if(!newPara) return alert("Falta 'Para'");
      const newRecoge = normOp($("xRecoge").value) || newPara;
      const note = normName($("xNote").value);

      const prevPara = l.operator;
      const prevRecoge = l.pickupBy || l.operator;

      l.operator = newPara;
      l.pickupBy = newRecoge;

      db.history.push({
        id: uid(),
        type: "XFER",
        toolId: t.id,
        toolName: t.name,
        fromOperator: prevPara,
        toOperator: newPara,
        pickupBy: newRecoge,
        qty: l.qty,
        serials: (l.serials||[]).slice(),
        outAt: l.outAt,
        at: nowIso(),
        notes: note,
        variant: l.variant || ""
      });

      saveAll(); closeModal(); render();
    }}
  ]);
}

function openOperatorManager() {
    const renderOps = (searchVal = "") => {
        let rows = "";
        const filtered = db.operators.filter(op => 
            op.name.toLowerCase().includes(searchVal) || 
            (op.dept||"").toLowerCase().includes(searchVal)
        );
        filtered.sort((a,b)=>a.name.localeCompare(b.name));

        filtered.forEach(op => {
            rows += `
              <tr>
                <td><b>${esc(op.name)}</b></td>
                <td>${esc(op.phone||"-")}</td>
                <td>${esc(op.dept||"-")}</td>
                <td style="text-align:right">
                    <button class="icon-btn edit" onclick="editOp('${op.id}')">✏️</button>
                    <button class="icon-btn del" onclick="deleteOp('${op.id}')">🗑️</button>
                </td>
              </tr>
            `;
        });

        return `
          <div style="margin-bottom:10px; display:flex; gap:10px;">
            <input id="opSearch" placeholder="Buscar operario..." value="${esc(searchVal)}" style="flex:1">
            <button class="btn primary" id="btnAddOp">+ Nuevo</button>
          </div>
          <div style="max-height:50vh; overflow:auto">
            <table>
              <thead><tr><th>Nombre</th><th>Teléfono</th><th>Dpto</th><th></th></tr></thead>
              <tbody>${rows || '<tr><td colspan="4" style="text-align:center;color:var(--mut)">Sin operarios</td></tr>'}</tbody>
            </table>
          </div>
        `;
    };

    showModal("Gestión de Operarios", renderOps(), [{text:"Cerrar", className:"btn", onClick:closeModal}]);

    const bindEvents = () => {
        const inp = $("opSearch");
        if(inp) inp.oninput = (e) => {
            $("mBody").innerHTML = renderOps(e.target.value.toLowerCase());
            bindEvents();
            const newInp = $("opSearch");
            newInp.value = e.target.value;
            newInp.focus();
        };
        const btnAdd = $("btnAddOp");
        if(btnAdd) btnAdd.onclick = () => openOpForm();
    };
    bindEvents();
}

function openCatalogManager(isPickerMode = false, onSelect = null) {
  const renderManager = () => {

          <button class="btn primary" id="btnAddNewFamily">+ Familia</button>

          <div class="spacer"></div>
          ${!isPickerMode && !IS_TOUCH ? `<span class="small" style="color:var(--mut)">Arrastra iconos para ordenar o mover entre familias.</span>` : ''}
          ${!isPickerMode && IS_TOUCH ? `<span class="small" style="color:var(--mut)">Modo tablet: gestión sin arrastre.</span>` : ''}
        </div>
        <div style="max-height:60vh; overflow-y:auto; padding-right:5px;">
      `;

      for(const [cat, list] of Object.entries(db.library)){
        html += `
          <div class="cat-header" data-cat="${cat}">
             <span>${cat} <span class="badge" style="margin-left:8px">${list.length}</span></span>
             <div class="cat-actions">
                <button class="icon-btn edit" title="Renombrar" onclick="renameFamily('${cat}')">✏️</button>
                <button class="icon-btn del" title="Borrar Familia" onclick="deleteFamily('${cat}')">🗑️</button>
             </div>
          </div>
          <div class="emojiGrid" data-cat="${cat}">
        `;
        html += list.map((e, idx) => `
            <button class="emojiBtn" 
              ${!IS_TOUCH ? `draggable="true"` : ''}
              data-cat="${cat}" 
              data-idx="${idx}"
              onclick="selectIcon('${cat}', ${idx})"
            >
              ${renderIcon(e)}
            </button>`
        ).join("");
        html += `</div>`;
      }
      html += `</div>`;

      if(isPickerMode) {
          $("aBody").innerHTML = html;
      } else {
          $("mBody").innerHTML = html;
      }

      attachCatalogEvents(isPickerMode, onSelect, renderManager);
  };

  if(isPickerMode){
      showAuxModal("Seleccionar Icono", "", [{text:"Cancelar", className:"btn", onClick:closeAuxModal}]);
  } else {
      showModal("Gestión de Catálogo", "", [{text:"Cerrar", className:"btn", onClick:closeModal}]);
  }

  renderManager();
}

window.renameFamily = (oldName) => {
    const newName = prompt("Nuevo nombre para la familia:", oldName);
    if(newName && newName !== oldName){
        if(db.library[newName]) return alert("Ese nombre ya existe");
        const entries = Object.entries(db.library);
        const newLib = {};
        for(const [k,v] of entries){
            if(k === oldName) newLib[newName] = v;
            else newLib[k] = v;
        }
        db.library = newLib;
        const idx = db.familyOrder.indexOf(oldName);
        if(idx > -1) db.familyOrder[idx] = newName;
        else db.familyOrder.push(newName);
        saveAll();
        const isAux = $("auxModal").classList.contains("show");
        openCatalogManager(isAux, isAux ? window.currentSelectCb : null);
        render();
    }
};

window.deleteFamily = (name) => {
    if(confirm(`¿Eliminar familia "${name}" y todos sus iconos?`)){
        delete db.library[name];
        db.familyOrder = db.familyOrder.filter(n => n !== name);
        saveAll();
        const isAux = $("auxModal").classList.contains("show");
        openCatalogManager(isAux, isAux ? window.currentSelectCb : null);
        render();
    }
};

window.selectIcon = (cat, idx) => {
    if(window.isPickerActive && window.currentSelectCb) {
        window.currentSelectCb(db.library[cat][idx]);
        closeAuxModal();
    } else {
        if(confirm("¿Eliminar este icono?")){
            db.library[cat].splice(idx, 1);
            saveAll();
            openCatalogManager(false);
        }
    }
}

function attachCatalogEvents(isPickerMode, onSelect, refreshCb) {
    window.isPickerActive = isPickerMode;
    window.currentSelectCb = onSelect;

    const btnAddFam = document.getElementById("btnAddNewFamily");
    const btnUpload = document.getElementById("btnUploadIcon");

    if(btnAddFam) btnAddFam.onclick = () => {
        const name = prompt("Nombre de la nueva familia:");
        if(name){
            if(db.library[name]) return alert("Ya existe");
            db.library[name] = [];
            db.familyOrder.push(name);
            saveAll();
            refreshCb();
            render();
        }
    };

    if(btnUpload) btnUpload.onclick = () => openUploadModal(refreshCb);

    if(IS_TOUCH) return;

    const icons = document.querySelectorAll('.emojiBtn');
    const headers = document.querySelectorAll('.cat-header');

    icons.forEach(icon => {
        icon.addEventListener('dragstart', (e) => {
            draggedIcon = {
                cat: icon.dataset.cat,
                idx: parseInt(icon.dataset.idx)
            };
            icon.classList.add('dragging-icon');
            e.dataTransfer.effectAllowed = 'move';
        });

        icon.addEventListener('dragend', () => {
            icon.classList.remove('dragging-icon');
            document.querySelectorAll('.emojiBtn').forEach(i => i.classList.remove('drag-over-icon'));
            document.querySelectorAll('.cat-header').forEach(h => h.classList.remove('drag-target'));
        });

        icon.addEventListener('dragover', (e) => { e.preventDefault(); icon.classList.add('drag-over-icon'); });
        icon.addEventListener('dragleave', () => icon.classList.remove('drag-over-icon'));
        icon.addEventListener('drop', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const targetCat = icon.dataset.cat;
            const targetIdx = parseInt(icon.dataset.idx);

            if(draggedIcon && (draggedIcon.cat !== targetCat || draggedIcon.idx !== targetIdx)){
                const item = db.library[draggedIcon.cat].splice(draggedIcon.idx, 1)[0];
                let finalIdx = targetIdx;
                db.library[targetCat].splice(finalIdx, 0, item);
                saveAll();
                refreshCb();
            }
        });
    });

    headers.forEach(header => {
        header.addEventListener('dragover', (e) => { e.preventDefault(); header.classList.add('drag-target'); });
        header.addEventListener('dragleave', () => header.classList.remove('drag-target'));
        header.addEventListener('drop', (e) => {
            e.stopPropagation();
            e.preventDefault();
            const targetCat = header.dataset.cat;
            if(draggedIcon && draggedIcon.cat !== targetCat){
                const item = db.library[draggedIcon.cat].splice(draggedIcon.idx, 1)[0];
                db.library[targetCat].push(item);
                saveAll();
                refreshCb();
            }
        });
    });
}

function openUploadModal(parentRefreshCb) {
  let tempImgData = null; 
  let baseImg = null; 
  const isAux = $("auxModal").classList.contains("show");
  const uploadModalId = isAux ? "modal" : "auxModal";
  const uploadModalTitle = isAux ? "mTitle" : "aTitle";
  const uploadModalBody = isAux ? "mBody" : "aBody";
  const uploadModalFoot = isAux ? "mFoot" : "aFoot";
  const uploadModalEl = $(uploadModalId);

  const body = `
    <div style="text-align:center">
      <div class="drop-zone" id="dz_upload">
        <span style="font-size:24px">📂</span><br>Click, Arrastrar o Ctrl+V
      </div>
      <input type="file" id="fi_upload" accept="image/*" style="display:none"/>
      <div class="slider-container"><label>Tono de Color</label><input type="range" id="sl_hue" min="0" max="360" value="0"></div>
      <div id="pv_upload" style="margin:15px 0; height:60px; display:flex; align-items:center; justify-content:center;"></div>
      <div style="text-align:left"><label>Familia destino:</label><select id="sel_cat_up">${Object.keys(db.library).map(k=>`<option value="${k}">${k}</option>`).join("")}</select></div>
    </div>
  `;

  $(uploadModalTitle).textContent = "Subir Nuevo Icono";
  $(uploadModalBody).innerHTML = body;
  const foot = $(uploadModalFoot);
  foot.innerHTML = "";

  const btnCancel = document.createElement("button");
  btnCancel.className = "btn";
  btnCancel.textContent = "Volver";
  btnCancel.onclick = () => {
      uploadModalEl.classList.remove("show");
  };

  const btnSave = document.createElement("button");
  btnSave.className = "btn primary";
  btnSave.textContent = "Guardar";
  btnSave.onclick = () => {
       if(!tempImgData) return alert("Falta imagen");
       const cat = $("sel_cat_up").value;
       db.library[cat].push(tempImgData);
       saveAll();
       uploadModalEl.classList.remove("show");
       parentRefreshCb();
  };

  foot.appendChild(btnCancel);
  foot.appendChild(btnSave);
  uploadModalEl.classList.add("show");

  const dz = $("dz_upload");
  const fi = $("fi_upload");
  const pv = $("pv_upload");
  const slider = $("sl_hue");

  const updatePreview = () => {
      if(!baseImg) return;
      const hue = slider.value;
      const canvas = document.createElement('canvas');
      canvas.width = baseImg.width; canvas.height = baseImg.height;
      const ctx = canvas.getContext('2d');
      ctx.filter = `hue-rotate(${hue}deg)`;
      ctx.drawImage(baseImg, 0, 0);
      tempImgData = canvas.toDataURL('image/png');
      pv.innerHTML = `<img src="${tempImgData}" style="border:1px solid #fff; border-radius:4px; padding:4px; background:#333"/>`;
  };

  const handleFile = (f) => {
    processImage(f, (base64) => {
      const img = new Image();
      img.onload = () => { baseImg = img; slider.value = 0; updatePreview(); };
      img.src = base64;
    });
  };

  dz.onclick = () => fi.click();
  slider.oninput = updatePreview;
  fi.onchange = (e) => { if(e.target.files[0]) handleFile(e.target.files[0]); };
  dz.ondragover = (e) => { e.preventDefault(); dz.classList.add("dragover"); };
  dz.ondragleave = () => dz.classList.remove("dragover");
  dz.ondrop = (e) => { e.preventDefault(); dz.classList.remove("dragover"); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
  document.onpaste = (e) => {
    if(!uploadModalEl.classList.contains("show")) return; 
    const items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for (const item of items) { if (item.kind === 'file' && item.type.startsWith('image/')) handleFile(item.getAsFile()); }
  };
}

function openLoanAction(id){
  if(!selected.has(id)) {
      selected.add(id);
      render();
  }
  setTimeout(() => openBatchLoan(), 10);
}

$("btnCatalogo").onclick = () => openCatalogManager(false);

function boot(){
  loadAll();
  if(!cfg.familyOpen) cfg.familyOpen = {};
  cfg.familyOpen = {};
  saveAll();
  render();
  setupFloatingDrag();
}
boot();

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDXKRAam6e8dlHFajtzMNueIo2hUMW-Gkg",
    authDomain: "gestion-taller-v2.firebaseapp.com",
    projectId: "gestion-taller-v2",
    storageBucket: "gestion-taller-v2.firebasestorage.app",
    messagingSenderId: "888590823508",
    appId: "1:888590823508:web:6dfd420a3e7ac17d647dc1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.__FIREBASE_TOOLS__ = { app, auth, db, onAuthStateChanged, doc, getDoc, setDoc, serverTimestamp };

  async function ensureLoggedIn() {
    const u = auth.currentUser;
    if (u) return u;
    return await new Promise((resolve) => {
      const unsub = onAuthStateChanged(auth, (user) => {
        unsub();
        resolve(user || null);
      });
      setTimeout(() => resolve(auth.currentUser || null), 1500);
    });
  }

  async function cloudSaveTools() {
    const user = await ensureLoggedIn();
    if (!user) {
      alert("⚠️ No estás logueado en la nube. Abre el INDEX, inicia sesión y vuelve aquí.");
      return;
    }

    const DB_KEY = window.DB_KEY || "tool_loans_db_v14_lib";
    const CFG_KEY = window.CFG_KEY || "tool_loans_cfg_v14_lib";

    const payload = {
      [DB_KEY]: localStorage.getItem(DB_KEY) || "",
      [CFG_KEY]: localStorage.getItem(CFG_KEY) || "",
    };

    const ref = doc(db, "backups", "tools_loans_v14");
    await setDoc(ref, {
      createdAt: serverTimestamp(),
      byUid: user.uid,
      keys: Object.keys(payload),
      payload
    }, { merge: true });

    alert("✅ Guardado en nube OK (Herramientas/Préstamos).");
  }

  async function cloudLoadTools() {
    const user = await ensureLoggedIn();
    if (!user) {
      alert("⚠️ No estás logueado en la nube. Abre el INDEX, inicia sesión y vuelve aquí.");
      return;
    }

    const ref = doc(db, "backups", "tools_loans_v14");
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      alert("⚠️ No hay copia en nube para Herramientas/Préstamos todavía.");
      return;
    }
    const data = snap.data() || {};
    const payload = data.payload || {};
    const keys = Object.keys(payload);

    try {
      for (const k of keys) {
        if (typeof payload[k] === "string") localStorage.setItem(k, payload[k]);
      }
    } catch (e) {
      console.error("CloudLoad localStorage error:", e);
      alert("❌ No se pudo restaurar en localStorage (memoria llena). Limpia espacio del sitio y vuelve a intentar.");
      return;
    }

    alert("✅ Cargado desde nube OK. Recarga la página para ver los datos.");
  }

  window.addEventListener("DOMContentLoaded", () => {
    const btnSave = document.getElementById("btnCloudSave");
    const btnLoad = document.getElementById("btnCloudLoad");
    if (btnSave) btnSave.addEventListener("click", cloudSaveTools);
    if (btnLoad) btnLoad.addEventListener("click", cloudLoadTools);
  });
</script>

<script type="module">
(async function(){
  if (window.__LDH_LIVE_SYNC_INSTALLED) return;
  window.__LDH_LIVE_SYNC_INSTALLED = true;
  window.__CLOUD_SYNC_DISABLE_LEGACY = true;

  const firebaseConfig = {
    apiKey: "AIzaSyDXKRAam6e8dlHFajtzMNueIo2hUMW-Gkg",
    authDomain: "gestion-taller-v2.firebaseapp.com",
    projectId: "gestion-taller-v2",
    storageBucket: "gestion-taller-v2.firebasestorage.app",
    messagingSenderId: "888590823508",
    appId: "1:888590823508:web:6dfd420a3e7ac17d647dc1"
  };

  const { initializeApp, getApps, getApp } = await import("https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js");
  const { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } = await import("https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js");
  const { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js");

  const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
  const auth = window.__FIREBASE__?.auth || getAuth(app);
  const db = window.__FIREBASE__?.db || getFirestore(app);

  window.__FIREBASE__ = Object.assign({}, window.__FIREBASE__ || {}, {
    app, auth, db,
    onAuthStateChanged, signInWithEmailAndPassword, signOut,
    doc, getDoc, setDoc, onSnapshot, serverTimestamp
  });

  const DOC_ID = "backup_main";
  const CHUNK = 800000;
  const CLIENT_ID_KEY = "LDH_LIVE_CLIENT_ID";
  const LAST_REV_KEY = "LDH_LIVE_LAST_REV";
  const SUPPRESS_MS = 2500;
  let unsubscribe = null;
  let saveTimer = null;
  let saving = false;
  let restoring = false;
  let started = false;
  let lastHash = "";
  let pendingRemoteRev = "";
  let pendingRemoteTimer = null;
  let lastUserActivity = 0;

  function sid(){
    try{
      let v = sessionStorage.getItem(CLIENT_ID_KEY);
      if(!v){
        v = "c_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2);
        sessionStorage.setItem(CLIENT_ID_KEY, v);
      }
      return v;
    }catch(e){ return "c_" + Math.random().toString(36).slice(2); }
  }
  const CLIENT_ID = sid();

  function getStoreItem(k){
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  }
  function hasUsefulLocalData(){
    try{
      const raw = getStoreItem("TallerFlowDB");
      if(raw && String(raw).length > 50){
        try{
          const obj = JSON.parse(raw);
          if(obj && Array.isArray(obj.concepts) && obj.concepts.length > 0) return true;
          if(obj && Array.isArray(obj.deliveryCompanies) && obj.deliveryCompanies.length > 0) return true;
        }catch(e){}
        if(String(raw).length > 5000) return true;
      }
      const stock = getStoreItem("taller_stock_v3_data");
      if(stock && String(stock).length > 100) return true;
      const tools = getStoreItem("tool_loans_db_v14_lib");
      if(tools && String(tools).length > 100) return true;
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i) || "";
        if(k.indexOf("prep_") === 0 || k === "ldh_db") return true;
      }
      return false;
    }catch(e){ return false; }
  }

  function collectLocalStorage(){
    const all = {};
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!k) continue;
      if(k.indexOf("firebase:") === 0) continue;
      if(k === CLIENT_ID_KEY || k === LAST_REV_KEY) continue;
      all[k] = localStorage.getItem(k);
    }
    return all;
  }

  function fastHash(str){
    let h = 2166136261;
    for(let i=0;i<str.length;i++){
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return String(h >>> 0) + ":" + str.length;
  }

  async function liveBackupToFirestore(docId = DOC_ID){
    if(restoring || saving) return { skipped:true, reason:"busy" };
    if(!auth.currentUser) return { skipped:true, reason:"no_user" };
    if(!hasUsefulLocalData()) return { skipped:true, reason:"empty_local" };

    const all = collectLocalStorage();
    const json = JSON.stringify(all);
    const hash = fastHash(json);
    if(hash === lastHash) return { skipped:true, reason:"no_changes" };

    saving = true;
    try{
      const total = Math.max(1, Math.ceil(json.length / CHUNK));
      const revision = Date.now().toString(36) + "_" + CLIENT_ID;
      for(let i=0;i<total;i++){
        const part = json.slice(i * CHUNK, (i + 1) * CHUNK);
        await setDoc(doc(db, "backups", docId, "chunks", String(i)), { i, part, revision });
      }
      await setDoc(doc(db, "backups", docId), {
        updatedAt: serverTimestamp(),
        createdAt: serverTimestamp(),
        revision,
        clientId: CLIENT_ID,
        totalChunks: total,
        totalBytes: json.length,
        totalKeys: Object.keys(all).length,
        mode: "GESTION_TALLER_V2_LIVE_SYNC"
      }, { merge:false });
      lastHash = hash;
      try{ sessionStorage.setItem(LAST_REV_KEY, revision); }catch(e){}
      console.log("✅ LiveSync: subido a Firestore", { totalChunks:total, totalKeys:Object.keys(all).length, totalBytes:json.length });
      return { docId, totalChunks:total, totalBytes:json.length, totalKeys:Object.keys(all).length, revision };
    }finally{
      setTimeout(()=>{ saving = false; }, SUPPRESS_MS);
    }
  }

  async function liveRestoreFromFirestore(docId = DOC_ID){
    if(restoring) return { skipped:true, reason:"restoring" };
    restoring = true;
    try{
      const metaSnap = await getDoc(doc(db, "backups", docId));
      if(!metaSnap.exists()) throw new Error("No existe backup en Firestore: " + docId);
      const meta = metaSnap.data() || {};
      const total = meta.totalChunks || 0;
      if(!total) throw new Error("Backup sin chunks: " + docId);
      let json = "";
      for(let i=0;i<total;i++){
        const cSnap = await getDoc(doc(db, "backups", docId, "chunks", String(i)));
        if(!cSnap.exists()) throw new Error("Falta chunk " + i);
        json += cSnap.data().part || "";
      }
      const all = JSON.parse(json);
      localStorage.clear();
      for(const [k,v] of Object.entries(all)) localStorage.setItem(k, v);
      try{ sessionStorage.setItem(LAST_REV_KEY, meta.revision || ""); }catch(e){}
      lastHash = fastHash(JSON.stringify(collectLocalStorage()));
      console.log("✅ LiveSync: restaurado desde Firestore", { keys:Object.keys(all).length, revision:meta.revision });
      return { docId, keys:Object.keys(all).length, revision:meta.revision };
    }finally{
      setTimeout(()=>{ restoring = false; }, SUPPRESS_MS);
    }
  }

  function scheduleLiveBackup(reason){
    if(!started || restoring || saving) return;
    // Si hay un cambio remoto pendiente y el usuario acaba de guardar algo local,
    // prima el trabajo local para no cerrar formularios ni pisar lo que está editando.
    if(pendingRemoteRev){
      console.log("⏸️ LiveSync: cambio remoto pendiente ignorado por cambio local", { reason, pendingRemoteRev });
      pendingRemoteRev = "";
      clearTimeout(pendingRemoteTimer);
      pendingRemoteTimer = null;
    }
    clearTimeout(saveTimer);
    saveTimer = setTimeout(()=>liveBackupToFirestore(DOC_ID).catch(e=>console.warn("❌ LiveSync backup ERROR", e)), 1800);
  }

  // Detectar cambios locales hechos por cualquier módulo que guarde en localStorage.
  if(!window.__LDH_LIVE_STORAGE_PATCHED){
    window.__LDH_LIVE_STORAGE_PATCHED = true;
    const p = Storage.prototype;
    const oldSet = p.setItem;
    const oldRemove = p.removeItem;
    const oldClear = p.clear;
    p.setItem = function(k,v){ const r = oldSet.apply(this, arguments); if(this === localStorage) scheduleLiveBackup("setItem:" + k); return r; };
    p.removeItem = function(k){ const r = oldRemove.apply(this, arguments); if(this === localStorage) scheduleLiveBackup("removeItem:" + k); return r; };
    p.clear = function(){ const r = oldClear.apply(this, arguments); if(this === localStorage) scheduleLiveBackup("clear"); return r; };
  }

  function markUserActivity(){ lastUserActivity = Date.now(); }
  ["focusin","input","keydown","pointerdown","touchstart"].forEach(ev=>{
    try{ window.addEventListener(ev, markUserActivity, true); }catch(e){}
  });

  function elementVisible(el){
    try{
      const st = getComputedStyle(el);
      if(st.display === "none" || st.visibility === "hidden" || Number(st.opacity) === 0) return false;
      const r = el.getBoundingClientRect();
      return r.width > 0 && r.height > 0;
    }catch(e){ return false; }
  }

  function hasOpenModalOrEditor(){
    try{
      const selectors = [
        '[role="dialog"]', '.modal', '.dialog', '.popup', '.overlay', '.drawer',
        '#modal', '#dlg', '[id*="modal" i]', '[class*="modal" i]', '[class*="dialog" i]'
      ];
      return selectors.some(sel => Array.from(document.querySelectorAll(sel)).some(elementVisible));
    }catch(e){ return false; }
  }

  function isUserEditing(){
    try{
      const ae = document.activeElement;
      const tag = ae && ae.tagName ? ae.tagName.toLowerCase() : "";
      if(ae && (tag === "input" || tag === "textarea" || tag === "select" || ae.isContentEditable)) return true;
      if(Date.now() - lastUserActivity < 12000) return true;
      if(hasOpenModalOrEditor()) return true;
    }catch(e){}
    return false;
  }

  async function applyRemoteChange(rev){
    if(!rev || restoring || saving) return;
    if(isUserEditing()){
      pendingRemoteRev = rev;
      clearTimeout(pendingRemoteTimer);
      pendingRemoteTimer = setTimeout(()=>{
        if(pendingRemoteRev && !isUserEditing()){
          const r = pendingRemoteRev;
          pendingRemoteRev = "";
          applyRemoteChange(r).catch(e=>console.warn("❌ LiveSync apply delayed ERROR", e));
        }else if(pendingRemoteRev){
          // Sigue editando: reintentar más tarde sin cerrar el formulario.
          const r = pendingRemoteRev;
          pendingRemoteRev = "";
          applyRemoteChange(r).catch(e=>console.warn("❌ LiveSync apply delayed ERROR", e));
        }
      }, 6000);
      console.log("⏸️ LiveSync: cambio remoto aplazado porque hay formulario/edición abierta", rev);
      return;
    }
    console.log("⬇️ LiveSync: cambio remoto detectado", rev);
    await liveRestoreFromFirestore(DOC_ID);
    setTimeout(()=>location.reload(), 350);
  }

  async function startLiveSync(){
    if(started) return;
    started = true;
    window.__CLOUD_SYNC_DISABLE_LEGACY = true;

    if(!hasUsefulLocalData()){
      try{
        await liveRestoreFromFirestore(DOC_ID);
        setTimeout(()=>location.reload(), 300);
        return;
      }catch(e){ console.warn("⚠️ LiveSync: no se pudo auto-restaurar", e); }
    }else{
      // Subida inicial de seguridad con los datos locales actuales.
      setTimeout(()=>scheduleLiveBackup("initial"), 1200);
    }

    if(unsubscribe) unsubscribe();
    unsubscribe = onSnapshot(doc(db, "backups", DOC_ID), async (snap)=>{
      try{
        if(!snap.exists() || restoring || saving) return;
        const meta = snap.data() || {};
        const rev = meta.revision || "";
        const lastRev = sessionStorage.getItem(LAST_REV_KEY) || "";
        if(!rev || meta.clientId === CLIENT_ID || rev === lastRev) return;
        await applyRemoteChange(rev);
      }catch(e){ console.warn("❌ LiveSync snapshot ERROR", e); }
    });
    console.log("🔁 LiveSync v2 sin cierre de formularios: activo", firebaseConfig.projectId);
  }

  function stopLiveSync(){
    started = false;
    clearTimeout(saveTimer);
    if(unsubscribe){ unsubscribe(); unsubscribe = null; }
  }

  onAuthStateChanged(auth, (user)=>{
    if(user) startLiveSync();
    else stopLiveSync();
  });

  window.backupToFirestore = liveBackupToFirestore;
  window.restoreFromFirestore = liveRestoreFromFirestore;
  window.autoRestoreIfEmpty = liveRestoreFromFirestore;
  window.__ldhAutoRestoreAfterLogin = liveRestoreFromFirestore;
  window.__ldhLiveSyncNow = liveBackupToFirestore;
  window.__ldhLiveRestoreNow = liveRestoreFromFirestore;
})();
</script>
